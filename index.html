<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Page</title>
  <link rel="stylesheet" href="Style.css">
  <script src="Script.js" defer></script>
</head>
<body>
  <h1>Welcome to the Form Page</h1>
  <form id="loginForm" action="/submit" method="POST">
    <label for="username">Name:</label>
    <input type="text" id="username" name="username" required class="username-input">
    <br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required class="password-input">
    <br><br>
    <input type="submit" value="Submit" class="submit-button">
  </form>
</body>
</html>
